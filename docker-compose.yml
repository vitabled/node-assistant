services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node-installer-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      # Shared docker network name — node-assistant attaches the xray-checker
      # container to it and reaches the checker by container name.
      - XRAY_CHECKER_NETWORK=node-assistant-net
      # The shared xray-checker probes the aggregator's combined subscription.
      - SUBS_AGGREGATOR_URL=http://subs-aggregator:8080/sub
      - SUBS_AGGREGATOR_REFRESH_URL=http://subs-aggregator:8080/refresh
      - SUBS_AGGREGATOR_STATUS_URL=http://subs-aggregator:8080/status
      # Shared secret guarding /internal/agg-subs + the aggregator's /refresh.
      # Set a strong value in .env for prod (empty = guard disabled, dev only).
      - AGG_TOKEN=${AGG_TOKEN:-}
      # Task/log store. `memory` (default) = single-container monolith.
      # `shared` = SQLite under node-data, required to hand deploys to the
      # `deploy-worker` container. Safe to leave on `shared` even without the
      # split profile. See docker-compose.split.md / CLAUDE.md §10.
      - TASK_STORE=${TASK_STORE:-memory}
    volumes:
      - node-data:/app/data
      # Docker-out-of-Docker: manage the sibling xray-checker container via the
      # host daemon. The backend runs as root, so it can read the socket.
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Merges every account's tracked subscriptions into one combined subscription
  # that the shared xray-checker probes (reached by container name on the shared
  # network). Reads the active set from the backend's internal /agg-subs endpoint.
  subs-aggregator:
    build:
      context: ./subs-aggregator
      dockerfile: Dockerfile
    container_name: subs-aggregator
    restart: unless-stopped
    environment:
      - AGG_SOURCE_URL=http://node-installer-backend:8000/internal/agg-subs
      - PORT=8080
      - AGG_TOKEN=${AGG_TOKEN:-}
    expose:
      - "8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  # MCP server image. Built here so it exists for the backend's DooD orchestrator
  # to `docker run` (managed like the xray-checker container — see services/
  # mcp_server.py). Profile-gated so `compose up` does NOT start it; build with:
  #   docker compose --profile mcp-build build mcp
  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    image: node-installer-mcp:latest
    profiles: ["mcp-build"]
    networks:
      - app-net

  # ── Optional service split (Plan M) ────────────────────────────
  # Both workers run the SAME image as the backend and serve NO HTTP; they take
  # over background duties via the lease table on the shared node-data volume
  # (services/worker_lease.py). Enable with:
  #     docker compose --profile split up -d
  # Disable by simply dropping the profile — the gateway resumes every duty by
  # itself within the lease TTL. Neither worker is a hard dependency.

  # Owns the 5 background loops (xray poller, user-stats collector, rules,
  # checker autostart, server monitor). Needs docker.sock because the poller and
  # autostart manage the shared xray-checker container.
  monitoring:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node-installer-monitoring
    profiles: ["split"]
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "monitoring"]
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_ROLE=monitoring
      - XRAY_CHECKER_NETWORK=node-assistant-net
      - SUBS_AGGREGATOR_URL=http://subs-aggregator:8080/sub
      - SUBS_AGGREGATOR_REFRESH_URL=http://subs-aggregator:8080/refresh
      - SUBS_AGGREGATOR_STATUS_URL=http://subs-aggregator:8080/status
      - AGG_TOKEN=${AGG_TOKEN:-}
      - TASK_STORE=${TASK_STORE:-memory}
    volumes:
      - node-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-net

  # Runs the 14-step SSH deploy pipeline and node operations claimed from the
  # shared task queue. REQUIRES TASK_STORE=shared (that is the queue + log bridge);
  # without it the gateway simply never offloads and keeps running deploys itself.
  deploy-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: node-installer-deploy-worker
    profiles: ["split"]
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "deploy"]
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - SERVICE_ROLE=deploy-worker
      - XRAY_CHECKER_NETWORK=node-assistant-net
      - TASK_STORE=shared
    volumes:
      - node-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
        - VITE_WS_BASE=/ws
    container_name: node-installer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  app-net:
    # Explicit name so node-assistant can attach the xray-checker container to
    # this exact network (must match XRAY_CHECKER_NETWORK above).
    name: node-assistant-net
    driver: bridge

volumes:
  node-data:
